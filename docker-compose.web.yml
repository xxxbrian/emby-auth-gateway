# Opt-in Emby Web serving overlay.
#
# Mount a prepared web root (from an emby-web-static Release) and enable serve:
#
#   GATEWAY_WEB_ASSETS_HOST=/absolute/path/to/web-root \
#   docker compose -f docker-compose.yml -f docker-compose.web.yml up --build -d
#
# The host directory must already contain index.html, manifest.json, and
# strings/en-US.json at its root. Gateway never installs or verifies hashes.

services:
  gateway:
    environment:
      GATEWAY_WEB_ASSETS_DIR: /app/web_assets
      # Re-default public URL so host env cannot omit the fixed /emby base path.
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:${GATEWAY_PORT:-8090}/emby}
    volumes:
      - ${GATEWAY_WEB_ASSETS_HOST:?GATEWAY_WEB_ASSETS_HOST must be an absolute path to a web root}:/app/web_assets:ro
