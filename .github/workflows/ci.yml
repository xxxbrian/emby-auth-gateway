name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Hermetic Web install→serve→scripts/smoke.sh path (synthetic catalog only;
      # no official asset bytes).
      # -json + assertion ensures the named test actually ran (not a silent
      # zero-match pass from a mistyped -run regex).
      - name: Web deployment smoke
        run: |
          set -euo pipefail
          go test ./internal/embyweb -run '^TestSyntheticReadyDeploymentSmoke$' -count=1 -json \
            | tee web-deployment-smoke.json
          python3 - <<'PY'
          import json
          import sys

          path = "web-deployment-smoke.json"
          saw_run = False
          saw_pass = False
          package_fail = False
          events = []
          with open(path, encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      ev = json.loads(line)
                  except json.JSONDecodeError as e:
                      print(f"invalid go test -json line: {e}: {line!r}", file=sys.stderr)
                      sys.exit(1)
                  events.append(ev)
                  test = ev.get("Test") or ""
                  action = ev.get("Action") or ""
                  if test == "TestSyntheticReadyDeploymentSmoke":
                      if action == "run":
                          saw_run = True
                      if action == "pass":
                          saw_pass = True
                      if action == "fail":
                          print("TestSyntheticReadyDeploymentSmoke reported fail", file=sys.stderr)
                          sys.exit(1)
                  if not test and action == "fail":
                      package_fail = True

          if package_fail:
              print("package-level fail in go test -json stream", file=sys.stderr)
              sys.exit(1)
          if not saw_run:
              print(
                  "TestSyntheticReadyDeploymentSmoke did not run "
                  "(check -run regex; refusing silent no-match pass)",
                  file=sys.stderr,
              )
              sys.exit(1)
          if not saw_pass:
              print("TestSyntheticReadyDeploymentSmoke did not pass", file=sys.stderr)
              sys.exit(1)
          print("ok: TestSyntheticReadyDeploymentSmoke ran and passed")
          PY

      - name: Test
        run: go test ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compose config contracts
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config --format json >/tmp/compose-base.json
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config --format json >/tmp/compose-dev.json
          GATEWAY_WEB_CATALOG_ID=emby-web-4.9.5.0 \
          GATEWAY_WEB_SOURCE_KIND=dir \
          GATEWAY_WEB_SOURCE_MOUNT=/tmp/prepared-web \
          docker compose -f docker-compose.yml -f docker-compose.web.yml config --format json >/tmp/compose-web-dir.json
          GATEWAY_WEB_CATALOG_ID=emby-web-4.9.5.0 \
          GATEWAY_WEB_SOURCE_KIND=archive \
          GATEWAY_WEB_SOURCE_MOUNT=/tmp/tree.tar.gz \
          docker compose -f docker-compose.yml -f docker-compose.web.yml config --format json >/tmp/compose-web-archive.json
          GATEWAY_WEB_CATALOG_ID=emby-web-4.9.5.0 \
          GATEWAY_WEB_SOURCE_KIND=url \
          GATEWAY_WEB_SOURCE_VALUE=https://assets.example.com/emby-web/4.9.5.0/ \
          docker compose -f docker-compose.yml -f docker-compose.web.yml config --format json >/tmp/compose-web-url.json
          python3 - <<'PY'
          import json
          import sys

          def load(path: str):
              with open(path, encoding="utf-8") as f:
                  return json.load(f)

          def mounts(svc):
              return svc.get("volumes") or []

          def has_mount(svc, target, *, read_only=None, source=None):
              for m in mounts(svc):
                  if m.get("target") != target:
                      continue
                  if read_only is not None and bool(m.get("read_only")) != read_only:
                      continue
                  if source is not None and m.get("source") != source:
                      continue
                  return True
              return False

          def any_sock(cfg):
              blob = json.dumps(cfg)
              return "docker.sock" in blob

          base = load("/tmp/compose-base.json")
          if "web-init" in base.get("services", {}):
              print("base compose must not include web-init", file=sys.stderr)
              sys.exit(1)
          if any_sock(base):
              print("base compose must not mount docker.sock", file=sys.stderr)
              sys.exit(1)

          modes = {
              "dir": ("/tmp/compose-web-dir.json", "dir", "/source/input.tar.gz", "/tmp/prepared-web"),
              "archive": ("/tmp/compose-web-archive.json", "archive", "/source/input.tar.gz", "/tmp/tree.tar.gz"),
              "url": ("/tmp/compose-web-url.json", "url", "https://assets.example.com/emby-web/4.9.5.0/", None),
          }
          for label, (path, kind, source_value, host_source) in modes.items():
              cfg = load(path)
              if any_sock(cfg):
                  print(f"{label}: docker.sock forbidden", file=sys.stderr)
                  sys.exit(1)
              services = cfg.get("services") or {}
              if set(services) < {"gateway", "web-init"}:
                  print(f"{label}: expected gateway and web-init", file=sys.stderr)
                  sys.exit(1)
              gw = services["gateway"]
              init = services["web-init"]
              if gw.get("image") != init.get("image"):
                  print(f"{label}: gateway/web-init image mismatch", file=sys.stderr)
                  sys.exit(1)
              dep = ((gw.get("depends_on") or {}).get("web-init") or {})
              if dep.get("condition") != "service_completed_successfully":
                  print(f"{label}: gateway must depend on web-init completed successfully", file=sys.stderr)
                  sys.exit(1)
              if dep.get("required") is False:
                  print(f"{label}: web-init dependency must be required", file=sys.stderr)
                  sys.exit(1)
              env = gw.get("environment") or {}
              if env.get("GATEWAY_BASE_PATH") != "/emby":
                  print(f"{label}: gateway base path must be /emby", file=sys.stderr)
                  sys.exit(1)
              if env.get("GATEWAY_WEB_ASSETS_DIR") != "/app/web_assets":
                  print(f"{label}: gateway assets dir must be /app/web_assets", file=sys.stderr)
                  sys.exit(1)
              if not has_mount(gw, "/app/web_assets", read_only=True):
                  print(f"{label}: gateway assets mount must be read-only", file=sys.stderr)
                  sys.exit(1)
              if has_mount(gw, "/source/input.tar.gz"):
                  print(f"{label}: gateway must not receive source mount", file=sys.stderr)
                  sys.exit(1)
              if has_mount(init, "/app/pb_data") or has_mount(gw, "/app/pb_data") and False:
                  pass
              if has_mount(init, "/app/pb_data"):
                  print(f"{label}: web-init must not mount pb_data", file=sys.stderr)
                  sys.exit(1)
              if not has_mount(init, "/app/web_assets", read_only=False):
                  print(f"{label}: web-init assets mount must be read-write", file=sys.stderr)
                  sys.exit(1)
              if not has_mount(init, "/source/input.tar.gz", read_only=True, source=host_source if host_source else None):
                  # URL mode uses a named volume; source name may be project-prefixed.
                  if kind != "url" or not has_mount(init, "/source/input.tar.gz", read_only=True):
                      print(f"{label}: frozen RO source mount missing/wrong", file=sys.stderr)
                      sys.exit(1)
              cmd = init.get("command") or []
              want_prefix = ["--dir", "/tmp/pb_data", "web", "init", "--catalog-id", "emby-web-4.9.5.0", "--source-kind", kind, "--source", source_value]
              if cmd != want_prefix:
                  print(f"{label}: command argv mismatch:\n  got {cmd}\n  want {want_prefix}", file=sys.stderr)
                  sys.exit(1)
              if init.get("restart") not in ("no", "disabled", False, "False"):
                  # compose json may normalize restart
                  if str(init.get("restart")) != "no":
                      print(f"{label}: web-init restart must be no, got {init.get('restart')!r}", file=sys.stderr)
                      sys.exit(1)
              if init.get("read_only") is not True:
                  print(f"{label}: web-init read_only rootfs required", file=sys.stderr)
                  sys.exit(1)
              caps = init.get("cap_drop") or []
              if "ALL" not in caps:
                  print(f"{label}: web-init must cap_drop ALL", file=sys.stderr)
                  sys.exit(1)
          print("ok: compose config contracts")
          PY

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: emby-auth-gateway:ci
          build-args: |
            VERSION=ci
            REVISION=${{ github.sha }}
            BUILD_DATE=unknown
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Unknown catalog failure ordering
        run: |
          set -euo pipefail
          PROJECT="webinit-fail-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          SRC=$(mktemp -d)
          export GATEWAY_IMAGE=emby-auth-gateway:ci
          export GATEWAY_WEB_CATALOG_ID=does-not-exist
          export GATEWAY_WEB_SOURCE_KIND=dir
          export GATEWAY_WEB_SOURCE_MOUNT="$SRC"
          cleanup() {
            docker compose -p "$PROJECT" -f docker-compose.yml -f docker-compose.web.yml down -v --remove-orphans >/dev/null 2>&1 || true
            rm -rf "$SRC"
          }
          trap cleanup EXIT
          set +e
          docker compose -p "$PROJECT" -f docker-compose.yml -f docker-compose.web.yml up -d --no-build
          rc=$?
          set -e
          running=$(docker compose -p "$PROJECT" ps --status running -q | wc -l | tr -d ' ')
          echo "up_exit=$rc running=$running"
          test "$rc" -ne 0
          test "$running" = "0"
          echo "ok: unknown catalog prevents gateway start"
