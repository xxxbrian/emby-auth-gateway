name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Hermetic Web serve→scripts/smoke.sh path (fixture tree only).
      # -json + assertion ensures the named test actually ran (not a silent
      # zero-match pass from a mistyped -run regex).
      - name: Web deployment smoke
        run: |
          set -euo pipefail
          go test ./internal/embyweb -run '^TestSyntheticReadyDeploymentSmoke$' -count=1 -json \
            | tee web-deployment-smoke.json
          python3 - <<'PY'
          import json
          import sys

          path = "web-deployment-smoke.json"
          saw_run = False
          saw_pass = False
          package_fail = False
          with open(path, encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      ev = json.loads(line)
                  except json.JSONDecodeError as e:
                      print(f"invalid go test -json line: {e}: {line!r}", file=sys.stderr)
                      sys.exit(1)
                  test = ev.get("Test") or ""
                  action = ev.get("Action") or ""
                  if test == "TestSyntheticReadyDeploymentSmoke":
                      if action == "run":
                          saw_run = True
                      if action == "pass":
                          saw_pass = True
                      if action == "fail":
                          print("TestSyntheticReadyDeploymentSmoke reported fail", file=sys.stderr)
                          sys.exit(1)
                  if not test and action == "fail":
                      package_fail = True

          if package_fail:
              print("package-level fail in go test -json stream", file=sys.stderr)
              sys.exit(1)
          if not saw_run:
              print(
                  "TestSyntheticReadyDeploymentSmoke did not run "
                  "(check -run regex; refusing silent no-match pass)",
                  file=sys.stderr,
              )
              sys.exit(1)
          if not saw_pass:
              print("TestSyntheticReadyDeploymentSmoke did not pass", file=sys.stderr)
              sys.exit(1)
          print("ok: TestSyntheticReadyDeploymentSmoke ran and passed")
          PY

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Pack script fixture
        run: |
          set -euo pipefail
          chmod +x tools/emby-web-static/pack.sh
          ROOT="$RUNNER_TEMP/web-fixture"
          OUT="$RUNNER_TEMP/web-pack"
          mkdir -p "$ROOT/strings" "$OUT"
          printf '%s\n' '<!doctype html>' >"$ROOT/index.html"
          printf '%s\n' '{}' >"$ROOT/manifest.json"
          printf '%s\n' '{}' >"$ROOT/strings/en-US.json"
          tools/emby-web-static/pack.sh --version 0.0.0 --date 20260101 --src "$ROOT" --out "$OUT"
          test -f "$OUT/emby-web-static-0.0.0-20260101.tar.gz"
          test -s "$OUT/SHA256SUMS"
          # Symlink must be refused
          ln -s /etc/hosts "$ROOT/evil-link"
          if tools/emby-web-static/pack.sh --version 0.0.0 --date 20260102 --src "$ROOT" --out "$OUT-bad"; then
            echo "pack should reject symlink" >&2
            exit 1
          fi
          echo "ok: pack fixture"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compose config contracts
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config --format json >/tmp/compose-base.json
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config --format json >/tmp/compose-dev.json
          GATEWAY_WEB_ASSETS_HOST=/tmp/prepared-web \
          docker compose -f docker-compose.yml -f docker-compose.web.yml config --format json >/tmp/compose-web.json
          python3 - <<'PY'
          import json
          import sys

          def load(path: str):
              with open(path, encoding="utf-8") as f:
                  return json.load(f)

          def mounts(svc):
              return svc.get("volumes") or []

          def has_mount(svc, target, *, read_only=None):
              for m in mounts(svc):
                  if m.get("target") != target:
                      continue
                  if read_only is not None and bool(m.get("read_only")) != read_only:
                      continue
                  return True
              return False

          def any_sock(cfg):
              return "docker.sock" in json.dumps(cfg)

          base = load("/tmp/compose-base.json")
          if "web-init" in base.get("services", {}):
              print("base compose must not include web-init", file=sys.stderr)
              sys.exit(1)
          if "web" in base.get("services", {}):
              print("base compose must not include web installer service", file=sys.stderr)
              sys.exit(1)
          if any_sock(base):
              print("base compose must not mount docker.sock", file=sys.stderr)
              sys.exit(1)

          web = load("/tmp/compose-web.json")
          if any_sock(web):
              print("web overlay: docker.sock forbidden", file=sys.stderr)
              sys.exit(1)
          services = web.get("services") or {}
          if "web-init" in services:
              print("web overlay must not include web-init", file=sys.stderr)
              sys.exit(1)
          gw = services.get("gateway")
          if not gw:
              print("web overlay missing gateway", file=sys.stderr)
              sys.exit(1)
          env = gw.get("environment") or {}
          if env.get("GATEWAY_WEB_ASSETS_DIR") != "/app/web_assets":
              print("gateway assets dir must be /app/web_assets", file=sys.stderr)
              sys.exit(1)
          if not has_mount(gw, "/app/web_assets", read_only=True):
              print("gateway assets mount must be read-only", file=sys.stderr)
              sys.exit(1)
          print("ok: compose config contracts")
          PY

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: emby-auth-gateway:ci
          build-args: |
            VERSION=ci
            REVISION=${{ github.sha }}
            BUILD_DATE=unknown
          cache-from: type=gha
          cache-to: type=gha,mode=max
