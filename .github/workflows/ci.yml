name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Hermetic Web installâ†’serveâ†’scripts/smoke.sh path (synthetic catalog only;
      # no official asset bytes).
      # -json + assertion ensures the named test actually ran (not a silent
      # zero-match pass from a mistyped -run regex).
      - name: Web deployment smoke
        run: |
          set -euo pipefail
          go test ./internal/embyweb -run '^TestSyntheticReadyDeploymentSmoke$' -count=1 -json \
            | tee web-deployment-smoke.json
          python3 - <<'PY'
          import json
          import sys

          path = "web-deployment-smoke.json"
          saw_run = False
          saw_pass = False
          package_fail = False
          events = []
          with open(path, encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      ev = json.loads(line)
                  except json.JSONDecodeError as e:
                      print(f"invalid go test -json line: {e}: {line!r}", file=sys.stderr)
                      sys.exit(1)
                  events.append(ev)
                  test = ev.get("Test") or ""
                  action = ev.get("Action") or ""
                  if test == "TestSyntheticReadyDeploymentSmoke":
                      if action == "run":
                          saw_run = True
                      if action == "pass":
                          saw_pass = True
                      if action == "fail":
                          print("TestSyntheticReadyDeploymentSmoke reported fail", file=sys.stderr)
                          sys.exit(1)
                  if not test and action == "fail":
                      package_fail = True

          if package_fail:
              print("package-level fail in go test -json stream", file=sys.stderr)
              sys.exit(1)
          if not saw_run:
              print(
                  "TestSyntheticReadyDeploymentSmoke did not run "
                  "(check -run regex; refusing silent no-match pass)",
                  file=sys.stderr,
              )
              sys.exit(1)
          if not saw_pass:
              print("TestSyntheticReadyDeploymentSmoke did not pass", file=sys.stderr)
              sys.exit(1)
          print("ok: TestSyntheticReadyDeploymentSmoke ran and passed")
          PY

      - name: Test
        run: go test ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: emby-auth-gateway:ci
          build-args: |
            VERSION=ci
            REVISION=${{ github.sha }}
            BUILD_DATE=unknown
          cache-from: type=gha
          cache-to: type=gha,mode=max
