name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v0.3.0
        required: true
        type: string
      latest:
        description: Tag the Docker image as latest
        required: true
        type: boolean
        default: false
      publish_binaries:
        description: Build and upload Linux/macOS release binaries
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/emby-auth-gateway

jobs:
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      version_no_v: ${{ steps.release.outputs.version_no_v }}
      latest: ${{ steps.release.outputs.latest }}
    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
            latest="${{ github.event.release.prerelease == false }}"
          else
            version="${{ inputs.version }}"
            latest="${{ inputs.latest }}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'version must look like v0.3.0, got %s\n' "$version" >&2
            exit 1
          fi
          {
            printf 'version=%s\n' "$version"
            printf 'version_no_v=%s\n' "${version#v}"
            printf 'latest=%s\n' "$latest"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.version }}
            type=raw,value=latest,enable=${{ steps.release.outputs.latest == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  binaries:
    name: Release Binaries
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ github.event_name == 'release' || inputs.publish_binaries }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.docker.outputs.version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.docker.outputs.version_no_v }}"
          mkdir -p dist build
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            name="gateway_${version}_${goos}_${goarch}"
            out="build/${name}/gateway"
            mkdir -p "build/${name}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/gateway
            tar -C "build/${name}" -czf "dist/${name}.tar.gz" gateway
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.docker.outputs.version }}
          name: ${{ needs.docker.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true
