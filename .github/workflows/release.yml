name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v0.3.0
        required: true
        type: string
      latest:
        description: Tag the Docker image as latest
        required: true
        type: boolean
        default: false
      publish_binaries:
        description: Build and upload Linux/macOS release binaries
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/emby-auth-gateway

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      version_no_v: ${{ steps.release.outputs.version_no_v }}
      latest: ${{ steps.release.outputs.latest }}
      build_date: ${{ steps.release.outputs.build_date }}
    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
            latest="${{ github.event.release.prerelease == false }}"
          else
            version="${{ inputs.version }}"
            latest="${{ inputs.latest }}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'version must look like v0.3.0, got %s\n' "$version" >&2
            exit 1
          fi
          {
            printf 'version=%s\n' "$version"
            printf 'version_no_v=%s\n' "${version#v}"
            printf 'latest=%s\n' "$latest"
            printf 'build_date=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

  linux:
    name: Linux ${{ matrix.goarch }} Binary and Image
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            platform: linux/amd64
            platform_pair: linux-amd64
          - goarch: arm64
            platform: linux/arm64
            platform_pair: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux binary
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version_no_v }}"
          commit="${{ github.sha }}"
          build_date="${{ needs.prepare.outputs.build_date }}"
          ldflags="-s -w -X github.com/xxxbrian/emby-auth-gateway/internal/version.Version=$version -X github.com/xxxbrian/emby-auth-gateway/internal/version.Commit=$commit -X github.com/xxxbrian/emby-auth-gateway/internal/version.Date=$build_date"
          name="gateway_${version}_linux_${{ matrix.goarch }}"
          mkdir -p "build/${name}" build/docker dist
          GOOS=linux GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -o "build/${name}/gateway" ./cmd/gateway
          cp "build/${name}/gateway" build/docker/gateway
          tar -C "build/${name}" -czf "dist/${name}.tar.gz" gateway

      - name: Upload Linux binary artifact
        if: ${{ github.event_name == 'release' || inputs.publish_binaries }}
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-linux-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          compression-level: 0

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: release
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version_no_v }}
            REVISION=${{ github.sha }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true

      - name: Export image digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  darwin:
    name: Darwin ${{ matrix.goarch }} Binary
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ github.event_name == 'release' || inputs.publish_binaries }}
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Darwin binary
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version_no_v }}"
          commit="${{ github.sha }}"
          build_date="${{ needs.prepare.outputs.build_date }}"
          ldflags="-s -w -X github.com/xxxbrian/emby-auth-gateway/internal/version.Version=$version -X github.com/xxxbrian/emby-auth-gateway/internal/version.Commit=$commit -X github.com/xxxbrian/emby-auth-gateway/internal/version.Date=$build_date"
          name="gateway_${version}_darwin_${{ matrix.goarch }}"
          mkdir -p "build/${name}" dist
          GOOS=darwin GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -o "build/${name}/gateway" ./cmd/gateway
          tar -C "build/${name}" -czf "dist/${name}.tar.gz" gateway

      - name: Upload Darwin binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-darwin-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          compression-level: 0

  docker-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - linux
    steps:
      - name: Download image digest artifacts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: image-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.latest == 'true' }}

      - name: Create and push manifest list
        shell: bash
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          tags=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tags+=("-t" "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          sources=()
          for digest in *; do
            sources+=("${{ env.IMAGE_NAME }}@sha256:${digest}")
          done
          docker buildx imagetools create "${tags[@]}" "${sources[@]}"

  release-assets:
    name: Release Assets
    runs-on: ubuntu-latest
    needs:
      - prepare
      - linux
      - darwin
    if: ${{ github.event_name == 'release' || inputs.publish_binaries }}
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: release-binary-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true
