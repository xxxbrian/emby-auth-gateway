services:
  gateway:
    depends_on:
      - emby

  emby:
    image: emby/embyserver:latest
    ports:
      - "${EMBY_PORT:-8096}:8096"
    environment:
      UID: "${EMBY_UID:-1000}"
      GID: "${EMBY_GID:-1000}"
      GIDLIST: "${EMBY_GIDLIST:-1000}"
    volumes:
      - emby_config:/config
      - ${EMBY_MEDIA_DIR:-./tmp/emby-media}:/mnt/share1

volumes:
  emby_config:
